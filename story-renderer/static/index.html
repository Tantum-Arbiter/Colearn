<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Renderer - Manual Job Interface</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { display: grid; grid-template-columns: 400px 1fr; height: 100vh; }
        
        /* Sidebar - Job Creation */
        .sidebar { background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; }
        .sidebar h1 { font-size: 1.4rem; margin-bottom: 20px; color: #e94560; display: flex; align-items: center; gap: 10px; }
        .sidebar h1::before { content: '🎨'; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 0.95rem; }
        .form-group textarea { min-height: 100px; resize: vertical; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #e94560; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .row-3 { grid-template-columns: 1fr 1fr 1fr; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #e94560; color: white; width: 100%; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary { background: #0f3460; color: #eee; }
        .btn-secondary:hover { background: #1a4a7a; }
        
        /* Character Reference Upload */
        .char-ref-section { background: #1a1a2e; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
        .char-ref-section h3 { font-size: 0.9rem; color: #e94560; margin-bottom: 10px; }
        .file-input-wrapper { position: relative; }
        .file-input-wrapper input[type="file"] { width: 100%; padding: 8px; background: #16213e; border: 2px dashed #0f3460; border-radius: 6px; cursor: pointer; }
        .char-preview { margin-top: 10px; max-width: 100%; max-height: 150px; border-radius: 6px; display: none; }
        
        /* Main Panel - Gallery */
        .main-panel { display: flex; flex-direction: column; }
        .toolbar { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; }
        .toolbar h2 { font-size: 1.1rem; color: #aaa; }
        .output-path { flex: 1; display: flex; align-items: center; gap: 8px; }
        .output-path input { flex: 1; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; }
        
        /* Job Queue */
        .queue-section { background: #0f3460; padding: 10px 20px; font-size: 0.85rem; display: flex; gap: 20px; }
        .queue-item { display: flex; align-items: center; gap: 6px; }
        .queue-item .status { width: 8px; height: 8px; border-radius: 50%; }
        .status-pending { background: #ffc107; }
        .status-running { background: #00bcd4; animation: pulse 1s infinite; }
        .status-complete { background: #4caf50; }
        .status-failed { background: #f44336; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Gallery */
        .gallery { flex: 1; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-content: start; }
        .gallery-item { background: #16213e; border-radius: 12px; overflow: hidden; position: relative; }
        .gallery-item img { width: 100%; aspect-ratio: 3/2; object-fit: cover; cursor: pointer; transition: transform 0.2s; }
        .gallery-item img:hover { transform: scale(1.02); }
        .gallery-item .info { padding: 12px; }
        .gallery-item .prompt { font-size: 0.8rem; color: #aaa; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .gallery-item .meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.75rem; color: #666; }
        .gallery-item .actions { display: flex; gap: 8px; margin-top: 10px; }
        .gallery-item .btn { padding: 6px 12px; font-size: 0.8rem; }
        
        /* Modal for full-size view */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: white; cursor: pointer; }
        
        /* Empty state */
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px; color: #666; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 10px; }
        
        /* Status toast */
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; background: #16213e; border: 1px solid #0f3460; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 100; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: #4caf50; }
        .toast.error { border-color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar - Job Creation Form -->
        <div class="sidebar">
            <h1>Story Renderer</h1>
            
            <form id="jobForm">
                <div class="form-group">
                    <label>Prompt</label>
                    <textarea id="prompt" placeholder="Describe the scene you want to generate..." required>A friendly dragon and a young knight standing in a sunny meadow, warm watercolor children's book illustration style, soft colors, whimsical</textarea>
                </div>
                
                <div class="form-group">
                    <label>Negative Prompt</label>
                    <textarea id="negativePrompt" style="min-height: 60px;">dark horror, gore, violence, scary, text, watermark, logo, nsfw, extra limbs, malformed</textarea>
                </div>
                
                <div class="form-group">
                    <label>Workflow Type</label>
                    <select id="workflowType">
                        <option value="full_page">Full Page (Single Pass)</option>
                        <option value="ipadapter">IP-Adapter (Character Conditioned)</option>
                        <option value="character_ref">Character Reference Sheet</option>
                        <option value="background">Background Only</option>
                    </select>
                </div>
                
                <div class="char-ref-section" id="charRefSection" style="display: none;">
                    <h3>🎭 Character Reference</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="charRefFile" accept="image/*">
                    </div>
                    <img id="charRefPreview" class="char-preview" alt="Character reference preview">
                    <div class="form-group" style="margin-top: 10px;">
                        <label>IP-Adapter Weight</label>
                        <input type="range" id="ipadapterWeight" min="0" max="1" step="0.05" value="0.75">
                        <span id="weightValue">0.75</span>
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>Width</label>
                        <input type="number" id="width" value="1024" step="64">
                    </div>
                    <div class="form-group">
                        <label>Height</label>
                        <input type="number" id="height" value="704" step="64">
                    </div>
                </div>
                
                <div class="row row-3">
                    <div class="form-group">
                        <label>Steps</label>
                        <input type="number" id="steps" value="24" min="10" max="50">
                    </div>
                    <div class="form-group">
                        <label>CFG</label>
                        <input type="number" id="cfg" value="4.5" step="0.5" min="1" max="15">
                    </div>
                    <div class="form-group">
                        <label>Seed</label>
                        <input type="number" id="seed" placeholder="Random">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    🚀 Generate Image
                </button>
            </form>
        </div>

        <!-- Main Panel - Gallery -->
        <div class="main-panel">
            <div class="toolbar">
                <h2>Generated Images</h2>
                <div class="output-path">
                    <label>Save to:</label>
                    <input type="text" id="outputPath" placeholder="C:\MyImages\storybook" value="">
                </div>
                <button class="btn btn-secondary" onclick="refreshGallery()">🔄 Refresh</button>
                <button class="btn btn-secondary" onclick="clearGallery()">🗑️ Clear</button>
            </div>

            <div class="queue-section" id="queueSection">
                <div class="queue-item">
                    <span class="status status-complete"></span>
                    <span>Completed: <strong id="completedCount">0</strong></span>
                </div>
                <div class="queue-item">
                    <span class="status status-running"></span>
                    <span>Running: <strong id="runningCount">0</strong></span>
                </div>
                <div class="queue-item">
                    <span class="status status-pending"></span>
                    <span>Queued: <strong id="queuedCount">0</strong></span>
                </div>
            </div>

            <div class="gallery" id="gallery">
                <div class="empty-state">
                    <h3>No images yet</h3>
                    <p>Create a job using the form on the left to generate images.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Full-size image modal -->
    <div class="modal" id="imageModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="Full size preview">
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script>
        // State
        let generatedImages = [];
        let activeJobs = new Map();
        let charRefBase64 = null;
        let ipadapterAvailable = false;

        // Elements
        const jobForm = document.getElementById('jobForm');
        const submitBtn = document.getElementById('submitBtn');
        const gallery = document.getElementById('gallery');
        const workflowSelect = document.getElementById('workflowType');
        const charRefSection = document.getElementById('charRefSection');
        const charRefFile = document.getElementById('charRefFile');
        const charRefPreview = document.getElementById('charRefPreview');
        const ipadapterWeight = document.getElementById('ipadapterWeight');
        const weightValue = document.getElementById('weightValue');

        // Check capabilities on load
        async function checkCapabilities() {
            try {
                const response = await fetch('/v1/capabilities');
                if (response.ok) {
                    const caps = await response.json();
                    ipadapterAvailable = caps.ipadapter_available;

                    // Update IP-Adapter option in dropdown
                    const ipadapterOption = workflowSelect.querySelector('option[value="ipadapter"]');
                    if (ipadapterOption) {
                        if (!ipadapterAvailable) {
                            ipadapterOption.textContent = '🎨 IP-Adapter (Not Installed)';
                            ipadapterOption.style.color = '#666';
                        } else {
                            ipadapterOption.textContent = '🎨 IP-Adapter ✓';
                        }
                    }
                }
            } catch (err) {
                console.error('Failed to check capabilities:', err);
            }
        }
        checkCapabilities();

        // Show/hide character ref section based on workflow
        workflowSelect.addEventListener('change', () => {
            charRefSection.style.display = workflowSelect.value === 'ipadapter' ? 'block' : 'none';

            // Show warning if IP-Adapter not available
            if (workflowSelect.value === 'ipadapter' && !ipadapterAvailable) {
                showToast('⚠️ IP-Adapter not installed - will fall back to Full Page workflow', 'warning');
            }
        });

        // Update weight display
        ipadapterWeight.addEventListener('input', () => {
            weightValue.textContent = ipadapterWeight.value;
        });

        // Handle character reference file upload
        charRefFile.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    charRefBase64 = e.target.result.split(',')[1]; // Remove data:image/...;base64, prefix
                    charRefPreview.src = e.target.result;
                    charRefPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Submit job
        jobForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Submitting...';

            try {
                const jobData = {
                    job_type: 'page',
                    workflow_type: document.getElementById('workflowType').value,
                    priority: 'normal',
                    inputs: {
                        prompt: document.getElementById('prompt').value,
                        negative_prompt: document.getElementById('negativePrompt').value,
                        width: parseInt(document.getElementById('width').value),
                        height: parseInt(document.getElementById('height').value),
                        steps: parseInt(document.getElementById('steps').value),
                        cfg: parseFloat(document.getElementById('cfg').value),
                    },
                    metadata: {
                        custom_output_path: document.getElementById('outputPath').value || null
                    }
                };

                // Add seed if specified
                const seed = document.getElementById('seed').value;
                if (seed) jobData.inputs.seed = parseInt(seed);

                // Add character reference for ipadapter
                if (workflowSelect.value === 'ipadapter' && charRefBase64) {
                    jobData.inputs.character_ref_image = charRefBase64;
                    jobData.inputs.ipadapter_weight = parseFloat(ipadapterWeight.value);
                }

                const response = await fetch('/v1/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jobData)
                });

                if (!response.ok) throw new Error(await response.text());

                const result = await response.json();
                showToast(`Job submitted: ${result.job_id}`, 'success');

                // Track job
                activeJobs.set(result.job_id, { status: 'pending', prompt: jobData.inputs.prompt });
                updateQueueDisplay();
                pollJob(result.job_id);

            } catch (err) {
                showToast(`Error: ${err.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Generate Image';
            }
        });

        // Poll job status
        async function pollJob(jobId) {
            const jobInfo = activeJobs.get(jobId);
            try {
                const response = await fetch(`/v1/jobs/${jobId}`);
                const job = await response.json();

                jobInfo.status = job.status;
                updateQueueDisplay();

                if (job.status === 'completed' && job.outputs?.length > 0) {
                    // Add to gallery
                    const output = job.outputs[0];
                    generatedImages.unshift({
                        id: jobId,
                        fileId: output.file_id,
                        prompt: jobInfo.prompt,
                        timestamp: new Date().toLocaleTimeString(),
                        width: output.width,
                        height: output.height
                    });
                    renderGallery();
                    showToast('Image generated!', 'success');
                    activeJobs.delete(jobId);
                } else if (job.status === 'failed') {
                    showToast(`Job failed: ${job.error_message}`, 'error');
                    activeJobs.delete(jobId);
                } else {
                    // Still processing
                    setTimeout(() => pollJob(jobId), 2000);
                }
            } catch (err) {
                console.error('Poll error:', err);
                setTimeout(() => pollJob(jobId), 5000);
            }
        }

        // Update queue counts
        function updateQueueDisplay() {
            let completed = 0, running = 0, queued = 0;
            activeJobs.forEach(job => {
                if (job.status === 'completed') completed++;
                else if (job.status === 'processing') running++;
                else queued++;
            });
            document.getElementById('completedCount').textContent = generatedImages.length;
            document.getElementById('runningCount').textContent = running;
            document.getElementById('queuedCount').textContent = queued;
        }

        // Render gallery
        function renderGallery() {
            if (generatedImages.length === 0) {
                gallery.innerHTML = `<div class="empty-state"><h3>No images yet</h3><p>Create a job to generate images.</p></div>`;
                return;
            }

            gallery.innerHTML = generatedImages.map(img => `
                <div class="gallery-item">
                    <img src="/v1/files/${img.fileId}" alt="Generated image" onclick="openModal('/v1/files/${img.fileId}')">
                    <div class="info">
                        <div class="prompt">${escapeHtml(img.prompt)}</div>
                        <div class="meta">
                            <span>${img.width}x${img.height}</span>
                            <span>${img.timestamp}</span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-secondary" onclick="downloadImage('${img.fileId}', '${img.id}')">💾 Save</button>
                            <button class="btn btn-secondary" onclick="copyPrompt('${escapeHtml(img.prompt).replace(/'/g, "\\'")}')">📋 Copy Prompt</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Download/save image
        async function downloadImage(fileId, jobId) {
            const outputPath = document.getElementById('outputPath').value;
            if (outputPath) {
                // Save to custom path via API
                try {
                    const response = await fetch(`/v1/files/${fileId}/save`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: outputPath, filename: `image_${jobId}.png` })
                    });
                    if (response.ok) {
                        const result = await response.json();
                        showToast(`Saved to: ${result.saved_path}`, 'success');
                    } else {
                        throw new Error(await response.text());
                    }
                } catch (err) {
                    showToast(`Save failed: ${err.message}`, 'error');
                }
            } else {
                // Browser download
                const a = document.createElement('a');
                a.href = `/v1/files/${fileId}`;
                a.download = `image_${jobId}.png`;
                a.click();
            }
        }

        // Utility functions
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function copyPrompt(prompt) {
            navigator.clipboard.writeText(prompt);
            showToast('Prompt copied!', 'success');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
        }

        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function refreshGallery() { renderGallery(); }
        function clearGallery() { generatedImages = []; renderGallery(); updateQueueDisplay(); }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
